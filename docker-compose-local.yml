services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-adopt-backend-dev
    ports:
      - "8000:9090"
    environment:
      - ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=smartadopt_dev
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MONGO_URI=mongodb://mongo:27017/smartadopt_dev
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-adopt-frontend-dev
    ports:
      - "80:80"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    container_name: smart-adopt-postgres-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=smartadopt_dev
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
  mongo:
    image: mongo:7
    container_name: smart-adopt-mongo-dev
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=smartadopt_dev
    volumes:
      - mongo_dev_data:/data/db
    restart: unless-stopped
volumes:
  postgres_dev_data:
  mongo_dev_data: