name: CI- Continuous Integration
on:
  push:
    branches: ["develop", "qa", "main", "feature/**", "bugfix/**", "release/**"]
  pull_request:
    branches: ["develop", "qa", "main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend - Lint & Format (Ruff + Black + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install Dependencies
        run: |
          pip install ruff black mypy bandit
          pip install -r backend/requirements.txt
      - name: Ruff - linting
        run: ruff check backend/
      - name: Black - Format
        run: black --check backend/
      - name: mypy — Static Type
        run: mypy backend/ --ignore-missing-imports
      - name: Bandit - Security Scan
        run: bandit -r backend/ -ll

  backend-tests:
    name: Backend-Test (pytest)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install -r backend/requirements.txt
      - name: pytest
        run: pytest backend/ --cov=backend --cov-report=term-missing
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  frontend-lint:
    name: Frontend — Lint & Types (ESLint + Prettier + tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint — linting
        run: npm run lint
        working-directory: frontend

      - name: Prettier — format
        run: npx prettier --check "src/**/*.{ts,tsx}"
        working-directory: frontend

      - name: tsc — Check Types
        run: npx tsc --noEmit
        working-directory: frontend

  frontend-tests:
    name: Frontend — Tests (Vitest)
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Vitest
        run: npm run test
        working-directory: frontend