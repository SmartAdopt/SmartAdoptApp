services:
  prometheus:
    image: prom/prometheus:latest
    container_name: smart-adopt-prometheus-qa
    volumes:
      - ./prometheus-qa.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_qa_data:/prometheus
    networks:
      - monitoring-qa
      - smartadopt-qa
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: smart-adopt-grafana-qa
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_qa_data:/var/lib/grafana
      - ./datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    networks:
      - monitoring-qa
    depends_on:
      - prometheus
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: smart-adopt-cadvisor-qa
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-qa
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: smart-adopt-node-exporter-qa
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - monitoring-qa
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prometheus_qa_data:
  grafana_qa_data:

networks:
  monitoring-qa:
    name: monitoring-qa
    driver: bridge
  smartadopt-qa:
    external: true