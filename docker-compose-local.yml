services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-adopt-backend-dev
    ports:
      - "8000:9090"
    environment:
      - ENV=development
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - MONGO_URI=mongodb://mongodb:27017/smartadopt_dev
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-adopt-frontend-dev
    ports:
      - "8080:80" #-> Port change to avoid conflicts
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: smart-adopt-postgres-dev
    ports:
      - "${POSTGRES_HOST_PORT}:${POSTGRES_PORT}"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/app/database/postgres/init_postgres.sql:/docker-entrypoint-initdb.d/01-init.sql #-> Creation of tables in postgres when starting the container
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: smart-adopt-mongo-dev
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=smartadopt_dev
    volumes:
      - mongo_dev_data:/data/db
    restart: unless-stopped
volumes:
  postgres_dev_data:
  mongo_dev_data:
