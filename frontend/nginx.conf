# ./frontend/nginx.conf

server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # This is the magic line for React Router (Client-Side Routing)
        # If Nginx doesn't find a file or directory, it serves index.html
        try_files $uri $uri/ /index.html;
    }

    # Optional: Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}